  .count { font-size: 12px; color: #94a3b8; }
  .panel { display: none; }

  .gantt-head-cell { padding: 10px 16px; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }

  .gantt-cell { padding: 8px 16px; display: flex; align-items: center; }

  .badge { padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; white-space: nowrap; }

  .gantt-bar { position: absolute; height: 20px; border-radius: 6px; opacity: 0.85; display: flex; align-items: center; padding-left: 6px; overflow: hidden; }
  .gantt-bar span { font-size: 10px; color: #fff; font-weight: 700; white-space: nowrap; }
  .resumen-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }

  .bar-val { font-size: 13px; color: #64748b; }

  .bar-fill { height: 100%; border-radius: 99px; }
  .col-chart { display: flex; align-items: flex-end; gap: 10px; height: 110px; }
  .col-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .table-wrap { background: #fff; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow-x: auto; max-height: 75vh; overflow-y: auto; }

  thead tr { background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
  th { padding: 10px 14px; text-align: left; font-weight: 700; color: #64748b; text-transform: uppercase; font-size: 11px; white-space: nowrap; position: sticky; top: 0; background: #f8fafc; z-index: 1; }
  tbody tr { border-bottom: 1px solid #f1f5f9; }

  tbody tr:hover { background: #f0f4ff; }

  .bm-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }

  document.getElementById('main-filters').style.display=t==='benchmarks'?'none':'flex';

    return `<div class="gantt-row">
      <div class="gantt-cell" style="flex-direction:column;align-items:flex-start;gap:2px">
        <div style="display:flex;align-items:center"><div class="marca-dot" style="background:${mc}"></div><span style="font-size:12px;font-weight:700;color:#1e293b">${d.marca}</span></div>
        <span style="font-size:11px;color:#64748b;margin-left:14px">${d.campana} · ${d.plataforma}</span>
      </div>
      <div class="gantt-cell">${badge(d.estado)}</div>
      <div class="gantt-cell"><span class="badge-tipo">${d.tipo}</span></div>
      <div class="gantt-bar-wrap">${gl}
        <div class="gantt-bar" style="left:${left}%;width:${width}%;background:${c.bar}" title="${d.campana} · ${d.objetivo}"><span></span></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('panel-gantt').innerHTML=`
    <div class="gantt-wrap" style="min-width:700px">
      <div class="gantt-head">
        <div class="gantt-head-cell">Proyecto</div>
        <div class="gantt-head-cell">Estado</div>
        <div class="gantt-head-cell">Tipo</div>
        <div class="gantt-months">${mh}</div>
      </div>${rows}
    </div>`;
}

function renderResumen(){
  const porMarca={};
  DATA.forEach(d=>{
    if(!porMarca[d.marca]) porMarca[d.marca]={total:0};
    porMarca[d.marca].total++;
  });
  const marcaRows=Object.entries(porMarca).map(([m,v])=>`
    <div class="bar-row">
      <div class="bar-row-top">
        <span class="bar-label"><span style="width:10px;height:10px;border-radius:50%;background:${MARCA_COLOR[m]||'#6366f1'};display:inline-block"></span>${m}</span>
        <span class="bar-val">${v.total} estudios</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v.total/DATA.length)*100}%;background:${MARCA_COLOR[m]||'#6366f1'}"></div></div>
    </div>`).join('');
  const plats=["Meta","TikTok","Youtube","X"];
  const platColors={"Meta":"#1877f2","TikTok":"#010101","Youtube":"#ff0000","X":"#000"};
  const platRows=plats.map(p=>{
    const n=DATA.filter(d=>d.plataforma===p).length;
    return `<div class="bar-row"><div class="bar-row-top"><span class="bar-label">${p}</span><span class="bar-val">${n} estudios</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(n/DATA.length)*100}%;background:${platColors[p]||'#6366f1'}"></div></div></div>`;
  }).join('');
  const ports=[...new Set(DATA.map(d=>d.portfolio))];
  const portCols=["#6366f1","#f97316","#22c55e","#ec4899"];
  const portRows=ports.map((p,i)=>{
    const n=DATA.filter(d=>d.portfolio===p).length;
    return `<div class="bar-row"><div class="bar-row-top"><span class="bar-label">${p}</span><span class="bar-val">${n} estudios</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(n/DATA.length)*100}%;background:${portCols[i%portCols.length]}"></div></div></div>`;
  }).join('');
  const colCols=MONTHS.map(m=>{
    const mDate=new Date(MONTH_DATES[m]);
    const mEnd=new Date(mDate.getFullYear(),mDate.getMonth()+1,0);
    const n=DATA.filter(d=>new Date(d.inicio)<=mEnd&&new Date(d.fin)>=mDate).length;
    return `<div class="col-item"><span class="col-num">${n}</span><div class="col-bar" style="height:${Math.max((n/12)*80,2)}px"></div><span class="col-lbl">${m}</span></div>`;
  }).join('');
  document.getElementById('panel-resumen').innerHTML=`
    <div class="resumen-grid">
      <div class="card"><h3>Estudios por Marca</h3>${marcaRows}</div>
      <div class="card"><h3>Estudios por Plataforma</h3>${platRows}</div>
      <div class="card"><h3>Portfolio Strategy</h3>${portRows}</div>
      <div class="card full-width"><h3>Estudios activos por mes</h3><div class="col-chart">${colCols}</div></div>
    </div>`;
}

function renderTabla(filtered){
  const rows=filtered.map(d=>`
    <tr>
      <td><div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:${MARCA_COLOR[d.marca]||'#6366f1'};flex-shrink:0"></div><strong style="color:#1e293b">${d.marca}</strong></div></td>
      <td>${d.campana}</td>
      <td><span class="badge-tipo">${d.tipo}</span></td>
      <td>${d.plataforma}</td>
      <td>${d.portfolio}</td>
      <td>${badge(d.estado)}</td>
      <td>${d.inicio.slice(0,7)}</td>
      <td>${d.fin.slice(0,7)}</td>
    </tr>`).join('');
  document.getElementById('panel-tabla').innerHTML=`
    <div class="table-wrap"><table>
      <thead><tr><th>Marca</th><th>Campaña</th><th>Tipo</th><th>Plataforma</th><th>Portfolio</th><th>Estado</th><th>Inicio</th><th>Fin</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function avg(arr){ return arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length):0; }
function hbar(label,val,maxVal,color){
  const pct=Math.min((val/maxVal)*100,100);
  const inside=pct>25;
  return `<div class="hbar-row">
    <span class="hbar-label" title="${label}">${label}</span>
    <div class="hbar-track"><div class="hbar-fill" style="width:${pct}%;background:${color}">
      ${inside?`<span class="hbar-val">${val.toFixed(1)}</span>`:''}
    </div></div>
    ${!inside?`<span class="hbar-val-out">${val.toFixed(1)}</span>`:''}
  </div>`;
}

function renderBenchmarks(){
  const validos=BM_RAW.filter(d=>d.lift!==null&&!isNaN(d.lift));
  const metricas=["Todas",...new Set(validos.map(d=>d.metrica))];
  const filtered=bmMetrica==="Todas"?validos:validos.filter(d=>d.metrica===bmMetrica);
  const pills=metricas.map(m=>`<span class="metric-pill ${m===bmMetrica?'active':''}" onclick="setBmMetrica('${m}')">${m}</span>`).join('');

  const marcas=[...new Set(filtered.map(d=>d.marca))];
  const maxM=Math.max(...marcas.map(m=>avg(filtered.filter(d=>d.marca===m).map(d=>d.lift))));
  const porMarcaRows=marcas.map(m=>({m,v:avg(filtered.filter(d=>d.marca===m).map(d=>d.lift))})).sort((a,b)=>b.v-a.v).map(({m,v})=>hbar(m,v,maxM,BM_MARCA_COLOR[m]||"#6366f1")).join('');

  const mets=[...new Set(filtered.map(d=>d.metrica))];
  const maxMe=Math.max(...mets.map(me=>avg(filtered.filter(d=>d.metrica===me).map(d=>d.lift))));
  const metRows=mets.map(me=>({me,v:avg(filtered.filter(d=>d.metrica===me).map(d=>d.lift))})).sort((a,b)=>b.v-a.v).map(({me,v})=>hbar(me,v,maxMe,"#6366f1")).join('');

  const pps=[...new Set(filtered.map(d=>d.pp))].filter(p=>p&&p!=="-");
  const maxPP=Math.max(...pps.map(p=>avg(filtered.filter(d=>d.pp===p).map(d=>d.lift))));
  const ppRows=pps.map(p=>({p,v:avg(filtered.filter(d=>d.pp===p).map(d=>d.lift))})).sort((a,b)=>b.v-a.v).map(({p,v})=>hbar(p,v,maxPP,PP_COLOR[p]||"#94a3b8")).join('');

  const camps=[...new Set(filtered.map(d=>d.campana))];
  const maxC=Math.max(...camps.map(c=>avg(filtered.filter(d=>d.campana===c).map(d=>d.lift))));
  const campRows=camps.map(c=>{const rows=filtered.filter(d=>d.campana===c);return{c,marca:rows[0]?.marca||"",v:avg(rows.map(d=>d.lift))};}).sort((a,b)=>b.v-a.v).slice(0,12).map(({c,marca,v})=>hbar(`${c} (${marca})`,v,maxC,BM_MARCA_COLOR[marca]||"#6366f1")).join('');

  document.getElementById('panel-benchmarks').innerHTML=`
    <div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:8px">Filtrar por métrica:</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${pills}</div>
    </div>
    <div class="bm-grid">
      <div class="bm-card"><h3>📊 Lift promedio por Marca</h3>${porMarcaRows}</div>
      <div class="bm-card"><h3>🎯 Lift promedio por Métrica</h3>${metRows}</div>
      <div class="bm-card"><h3>🔥 Lift promedio por Passion Point</h3>${ppRows||'<p style="color:#94a3b8;font-size:12px">Sin datos para esta métrica</p>'}</div>
      <div class="bm-card" style="grid-column:1/-1"><h3>🏆 Ranking de Campañas por Lift (top 12)</h3>${campRows}</div>
    </div>`;
}

function setBmMetrica(m){ bmMetrica=m; renderBenchmarks(); }

function render(){
  const filtered=getFiltered();
  document.getElementById('f-count').textContent=filtered.length+' estudios';
  if(currentTab==='gantt') renderGantt(filtered);
  else if(currentTab==='resumen') renderResumen();
  else if(currentTab==='tabla') renderTabla(filtered);
  else renderBenchmarks();
}

initFilters(); renderStats(); render();
</script>
</body>
</html>
